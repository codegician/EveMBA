<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Gold gradient for text -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c060;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8922a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a06818;stop-opacity:1" />
    </linearGradient>
    <!-- Dim gold for tagline -->
    <linearGradient id="dimGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8922a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a5e18;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Subtle outer glow for icon -->
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background: transparent (works on dark UI) -->

  <!-- ─── ICON: Hexagon with orbit ring ─── -->
  <!-- Outer orbit ring -->
  <ellipse cx="56" cy="60" rx="42" ry="14" fill="none" stroke="#c8922a" stroke-width="1" stroke-dasharray="4 3" opacity="0.5" />
  <!-- Orbit dot -->
  <circle cx="98" cy="60" r="3.5" fill="#e8c060" opacity="0.9" />
  <!-- Hexagon body -->
  <polygon
    points="56,20 88,38 88,74 56,92 24,74 24,38"
    fill="#0d0c09"
    stroke="url(#goldGrad)"
    stroke-width="2"
    filter="url(#iconGlow)"
  />
  <!-- Inner hex -->
  <polygon
    points="56,30 80,44 80,72 56,86 32,72 32,44"
    fill="none"
    stroke="#c8922a"
    stroke-width="0.6"
    opacity="0.4"
  />
  <!-- Warp lines inside hex (stylised speed lines) -->
  <line x1="40" y1="42" x2="72" y2="42" stroke="#c8922a" stroke-width="0.8" opacity="0.35" />
  <line x1="36" y1="50" x2="76" y2="50" stroke="#c8922a" stroke-width="0.8" opacity="0.35" />
  <line x1="36" y1="58" x2="76" y2="58" stroke="#e8c060" stroke-width="1.2" opacity="0.55" />
  <line x1="36" y1="66" x2="76" y2="66" stroke="#c8922a" stroke-width="0.8" opacity="0.35" />
  <line x1="40" y1="74" x2="72" y2="74" stroke="#c8922a" stroke-width="0.8" opacity="0.35" />
  <!-- MBA mortar board cap icon, centred -->
  <!-- Board -->
  <polygon points="56,34 75,44 56,54 37,44" fill="url(#goldGrad)" filter="url(#glow)" />
  <!-- Tassel hang line -->
  <line x1="75" y1="44" x2="75" y2="60" stroke="#c8922a" stroke-width="1.5" />
  <circle cx="75" cy="62" r="3" fill="#c8922a" />
  <!-- Cylinder (cap crown) -->
  <rect x="47" y="54" width="18" height="8" rx="1" fill="#c8922a" opacity="0.7" />

  <!-- ─── LOGOTYPE ─── -->
  <!-- "Eve" -->
  <text
    x="118" y="72"
    font-family="'Orbitron', 'Rajdhani', 'Share Tech Mono', 'Courier New', monospace"
    font-size="46"
    font-weight="700"
    letter-spacing="2"
    fill="url(#goldGrad)"
    filter="url(#glow)"
  >Eve</text>
  <!-- "MBA" — slightly smaller, right-aligned to feel balanced -->
  <text
    x="244" y="72"
    font-family="'Orbitron', 'Rajdhani', 'Share Tech Mono', 'Courier New', monospace"
    font-size="46"
    font-weight="900"
    letter-spacing="3"
    fill="#ffffff"
    opacity="0.92"
    filter="url(#glow)"
  >MBA</text>

  <!-- Separator line -->
  <line x1="118" y1="80" x2="390" y2="80" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5" />

  <!-- Tagline -->
  <text
    x="119" y="96"
    font-family="'Orbitron', 'Share Tech Mono', 'Courier New', monospace"
    font-size="10.5"
    font-weight="400"
    letter-spacing="4"
    fill="url(#dimGold)"
    opacity="0.85"
  >INTERSTELLAR BUSINESS ACADEMY</text>
</svg>
